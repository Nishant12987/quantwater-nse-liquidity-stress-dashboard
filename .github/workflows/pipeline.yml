name: Liquidity Pipeline CI

on:
push:
schedule:
- cron: '0 3 * * *'   # Runs daily at 3 AM UTC

jobs:
pipeline:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Repo
    uses: actions/checkout@v3

  - name: Setup Python
    uses: actions/setup-python@v4
    with:
      python-version: "3.10"

  - name: Install Dependencies
    run: |
      pip install -r requirements.txt

  - name: Run Feature Pipeline
    run: |
      python 3-src/2-features/1-liquidity_metrics.py || true
      python 3-src/2-features/2-market_context.py || true

  - name: Generate Stress Labels
    run: |
      python 3-src/2-features/stress_labels.py || true

  - name: Run LSTM Model
    run: |
      python 3-src/3-models/2-lstm_architecture.py

  - name: Commit Updated Predictions
    run: |
      git config --global user.name "github-actions"
      git config --global user.email "actions@github.com"
      git add models/checkpoints/lstm_predictions.csv
      git commit -m "Auto update LSTM predictions" || echo "No changes"
      git push
```
